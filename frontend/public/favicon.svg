<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="finovoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="24" fill="#0B0F19" />
  <!-- Minimal line art 'F' + Neural Node fusion -->
  <path d="M 35 25 L 70 25 M 35 45 L 60 45" stroke="url(#finovoGrad)" stroke-width="12" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <path d="M 40 25 L 40 75" stroke="url(#finovoGrad)" stroke-width="12" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <!-- AI dot indicating intelligence -->
  <circle cx="68" cy="72" r="8" fill="#06b6d4" filter="url(#glow)"/>
</svg>
